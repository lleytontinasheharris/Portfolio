<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Lleyton Tinashe Harris — Aspiring AI Engineer | Software Developer."
    />
    <meta name="author" content="Lleyton Tinashe Harris" />
    <meta property="og:title" content="Lleyton Tinashe Harris" />
    <meta
      property="og:description"
      content="Aspiring AI Engineer | Software Developer."
    />
    <meta property="og:type" content="website" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />

    <title>Lleyton Tinashe Harris</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <!-- Animated background blobs -->
    <div class="bg-blobs">
      <div class="blob blob--1"></div>
      <div class="blob blob--2"></div>
      <div class="blob blob--3"></div>
    </div>

    <!-- ============================================================
         NAVBAR
    =============================================================== -->
    <nav class="navbar" id="navbar">
      <div class="navbar__inner">

        <!-- Logo -->
        <button class="navbar__logo" id="home-btn">
          <span class="navbar__logo-text">LTH</span>
        </button>

        <!-- Nav links -->
        <ul class="navbar__links">
          <li>
            <button class="nav-btn" data-page="about">
              <span class="nav-btn__icon">◆</span>
              <span class="nav-btn__label">About</span>
            </button>
          </li>
          <li>
            <button class="nav-btn" data-page="skills">
              <span class="nav-btn__icon">◆</span>
              <span class="nav-btn__label">Skills</span>
            </button>
          </li>
          <li>
            <button class="nav-btn" data-page="projects">
              <span class="nav-btn__icon">◆</span>
              <span class="nav-btn__label">Projects</span>
            </button>
          </li>
          <li>
            <button class="nav-btn" data-page="certifications">
              <span class="nav-btn__icon">◆</span>
              <span class="nav-btn__label">Certifications</span>
            </button>
          </li>
          <li>
            <button class="nav-btn" data-page="contact">
              <span class="nav-btn__icon">◆</span>
              <span class="nav-btn__label">Contact</span>
            </button>
          </li>
        </ul>

        <!-- Mobile menu toggle -->
        <button class="navbar__hamburger" id="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </button>

      </div>
    </nav>

    <!-- Mobile menu -->
    <div class="mobile-menu" id="mobile-menu">
      <ul class="mobile-menu__links">
        <li>
          <button class="mobile-nav-btn" data-page="about">About</button>
        </li>
        <li>
          <button class="mobile-nav-btn" data-page="skills">Skills</button>
        </li>
        <li>
          <button class="mobile-nav-btn" data-page="projects">Projects</button>
        </li>
        <li>
          <button class="mobile-nav-btn" data-page="certifications">
            Certifications
          </button>
        </li>
        <li>
          <button class="mobile-nav-btn" data-page="contact">Contact</button>
        </li>
      </ul>
    </div>

    <!-- ============================================================
         LANDING PAGE
    =============================================================== -->
    <div id="landing" class="landing page--visible">

      <div class="landing__content">

        <!-- Status badge -->
        <div class="landing__badge">
          <span class="badge__dot"></span>
          <span class="badge__text">Available for Attachment</span>
        </div>

        <!-- Name -->
        <h1 class="landing__name">
          <span class="landing__name-line">Lleyton</span>
          <span class="landing__name-line">Tinashe</span>
          <span class="landing__name-line landing__name-line--accent">Harris</span>
        </h1>

        <!-- Roles -->
        <div class="landing__roles">
          <span class="role">Aspiring AI Engineer</span>
          <span class="role__divider">✦</span>
          <span class="role">Software Developer</span>
          <span class="role__divider">✦</span>
          <span class="role">NUST, Zimbabwe</span>
        </div>

        <!-- Intro -->
        <p class="landing__intro">
          Building systems to solve real African problems. 
          From AI platforms to financial inclusion tools — 
          impact-first, always.
        </p>

        <!-- CTA Buttons -->
        <div class="landing__cta">
          <button class="btn btn--primary" data-page="projects">
            View My Work
            <span class="btn__arrow">→</span>
          </button>
          <button class="btn btn--secondary" data-page="contact">
            Get In Touch
          </button>
        </div>

        <!-- Quick stats -->
        <div class="landing__stats">
          <div class="stat">
            <span class="stat__number">4</span>
            <span class="stat__label">Projects</span>
          </div>
          <div class="stat__divider"></div>
          <div class="stat">
            <span class="stat__number">10+</span>
            <span class="stat__label">Technologies</span>
          </div>
          <div class="stat__divider"></div>
          <div class="stat">
            <span class="stat__number">1</span>
            <span class="stat__label">Certification</span>
          </div>
          <div class="stat__divider"></div>
          <div class="stat">
            <span class="stat__number">3rd</span>
            <span class="stat__label">Year</span>
          </div>
        </div>

      </div>

    </div>

    <!-- ============================================================
         PAGE CONTAINER (Content pages load here)
    =============================================================== -->
    <div id="page-container" class="page--hidden">
    </div>

    <!-- Page loader -->
    <div class="page-loader" id="page-loader">
      <div class="loader__spinner"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
